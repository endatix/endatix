name: Build, Test & Release

# Thin consumer of endatix/release-workflows (see its README):
#   • PR to main → tests (below) + build validation in the shared pipeline
#     (scripts/release-prepare.sh @ 0.0.0-ci — builds + packs, publishes nothing)
#   • push main  → tests, then canary vX.Y.Z-canary.N: semantic-release builds
#     once at the real version and publishes the NuGet packages to GitHub
#     Packages (canaries NEVER go to nuget.org — it is public and immutable).
#   • stable releases → MANUAL, human-reviewed: run "Start Stable Release"
#     (release-start.yml) → edit the draft notes → click "Publish release" →
#     release-artifacts.yml rebuilds at the tag and publishes to GitHub
#     Packages + nuget.org.
#
# The canary publishes ONLY after unit + integration tests pass (needs: below).
# Repo-specific release logic lives in scripts/release-prepare.sh and
# scripts/release-publish.sh (the consumer contract), plus the dormant `stable`
# branch required by semantic-release's branch validation.

on:
  pull_request:
    branches: [main, "hotfix/**"] # PRs into maintenance-line branches validate too
  push:
    branches: [main, "hotfix/**"] # hotfix/X.Y.x pushes publish vX.Y.Z-hotfix.N builds
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

# Serialize runs per ref so two quick merges to main can't run overlapping
# releases. Cancel in-flight runs only for pull requests to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Elevated permissions live on the pipeline job only — test jobs run read-only.
permissions:
  contents: read

jobs:
  unit-tests:
    name: "Endatix API: Build & Test"
    env:
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: 📦 Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: 🧪 Run unit tests
        run: |
          dotnet test --no-build \
            --filter "FullyQualifiedName!~Endatix.IntegrationTests" \
            --collect:"XPlat Code Coverage;Format=cobertura" \
            --results-directory:.coverage \
            --settings coverlet.runsettings
      - name: Install DotNet Coverage
        run: dotnet tool update --global dotnet-coverage
      - name: 📊 Merge Coverage Reports
        run: dotnet-coverage merge .coverage/endatix-hub/cobertura-coverage.xml .coverage/**/coverage.cobertura.xml -f cobertura -o .coverage/merged.cobertura.xml
      - name: 📊 Install DotNet Report Generator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool
      - name: 📊Add Summary Report
        run: reportgenerator -reports:".coverage/merged.cobertura.xml" -targetdir:".coverage/report" -reporttypes:"MarkdownSummaryGithub"
      - name: 📊 Upload to Coveralls
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          format: cobertura
          file: .coverage/merged.cobertura.xml
          debug: true
      - name: 📝 Output Summary Report
        run: |
          echo ">[!NOTE] " >> $GITHUB_STEP_SUMMARY
          echo ">#### 🧪 Endatix API: Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo ">[![Coverage Status](https://coveralls.io/repos/github/endatix/endatix/badge.svg?branch=$BRANCH_NAME)](https://coveralls.io/github/endatix/endatix?branch=$BRANCH_NAME)" >> $GITHUB_STEP_SUMMARY
          cat .coverage/report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

  integration-tests:
    name: "Endatix API: Integration tests"
    runs-on: ubuntu-24.04
    env:
      ENDATIX_TEST_DB_PROVIDER: PostgreSql
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: 📦 Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json
      - name: Set integration test filter
        env:
          GITHUB_REF_SAFE: ${{ github.ref }}
          GITHUB_EVENT_NAME_SAFE: ${{ github.event_name }}
        run: |
          if [ "$GITHUB_REF_SAFE" = "refs/heads/main" ] && [ "$GITHUB_EVENT_NAME_SAFE" != "pull_request" ]; then
            echo "INTEGRATION_TEST_FILTER=Category!=Keycloak&DbSpecific!=SqlServer" >> "$GITHUB_ENV"
          else
            echo "INTEGRATION_TEST_FILTER=Category!=Keycloak&Priority!=P2&DbSpecific!=SqlServer" >> "$GITHUB_ENV"
          fi
      - name: Build integration tests
        run: dotnet build tests/Endatix.IntegrationTests/Endatix.IntegrationTests.csproj -c Release
      - name: Run integration tests
        run: |
          dotnet test tests/Endatix.IntegrationTests/Endatix.IntegrationTests.csproj \
            -c Release --no-build --verbosity minimal \
            --filter "$INTEGRATION_TEST_FILTER"

  integration-tests-sqlserver:
    name: "Endatix API: SQL Server integration tests"
    runs-on: ubuntu-24.04
    env:
      ENDATIX_TEST_DB_PROVIDER: SqlServer
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: 📦 Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json
      - name: Build integration tests
        run: dotnet build tests/Endatix.IntegrationTests/Endatix.IntegrationTests.csproj -c Release
      - name: Run SQL Server integration tests
        run: |
          dotnet test tests/Endatix.IntegrationTests/Endatix.IntegrationTests.csproj \
            -c Release --no-build --verbosity minimal \
            --filter "Category!=Keycloak&DbSpecific!=PostgreSql"

  # Build validation on PRs; canary release on main — publishes only after ALL
  # tests above pass. docker-image makes the shared workflow log into GHCR and
  # export DOCKER_IMAGE to the release scripts; canaries stay on GHCR only, the
  # Docker Hub mirror is stable-only (release-publish.sh).
  # No secrets are passed: the shared workflow uses the implicit GITHUB_TOKEN
  # and fetches everything else via Infisical (OIDC, hence id-token).
  pipeline:
    name: Pipeline
    needs: [unit-tests, integration-tests, integration-tests-sqlserver]
    permissions:
      contents: read # release writes use the App token inside the shared workflow
      packages: write # GitHub Packages push + GHCR image push
      id-token: write # OIDC for Infisical inside the shared workflow
    uses: endatix/release-workflows/.github/workflows/canary.yml@cca02534258a68b196f9295afe9fd855ad9eee83 # v1
    with:
      docker-image: ghcr.io/endatix/endatix-api
      dotnet-version: "10.x" # global.json rolls forward within 10.0.x
