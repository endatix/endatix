# ==============================================================================
# Endatix Reverse Proxy Deployment Sample Configuration (Single Domain)
# ==============================================================================
# This configuration proxy-passes traffic from a single port/domain (e.g. 8080)
# to both the Endatix API (.NET) and the Endatix Hub (Next.js).
#
# See README.md in this folder for the matching Hub and API configuration.
#
# Topology:
#   - Next.js Hub (Frontend)   -> http://localhost:8080/app/
#   - .NET API (Backend)       -> http://localhost:8080/api/
# ==============================================================================

server {
    listen 80;
    server_name localhost;
    absolute_redirect off;

    # ==========================================
    # 1. Endatix Hub (Next.js Frontend)
    # Serves the UI and assets under the /app path prefix.
    # ==========================================
    location /app/ {
        proxy_pass http://host.docker.internal:3000/app/;

        proxy_http_version 1.1;

        # Preserve the public host and port for generated redirects.
        proxy_set_header Host $http_host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /app;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    # ==========================================
    # 2. Endatix API (.NET Backend)
    # Serves API routes under the /api path prefix.
    # ==========================================
    location /api/ {
        proxy_pass http://host.docker.internal:5000/api/;

        proxy_http_version 1.1;

        # Preserve the public host and port during API/Swagger redirects.
        proxy_set_header Host $http_host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /api;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    # ==========================================
    # 3. Root Redirect
    # ==========================================
    location / {
        return 302 /app/;
    }
}
